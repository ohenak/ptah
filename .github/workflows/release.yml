name: Release Ptah

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ptah

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ptah/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Bump version in package.json
        run: |
          current=$(node -p "require('./package.json').version")
          if [ "$current" != "${{ inputs.version }}" ]; then
            npm version "${{ inputs.version }}" --no-git-tag-version
          else
            echo "Version already $current — skipping npm version bump"
          fi

      - name: Create version bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff --quiet package.json && {
            echo "No version changes — skipping PR"
            exit 0
          }
          branch="release/ptah-v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add package.json
          git commit -m "release: bump ptah to v${{ inputs.version }}"
          git push -u origin "$branch"
          gh pr create \
            --title "release: ptah v${{ inputs.version }}" \
            --body "Automated version bump to v${{ inputs.version }}." \
            --base main \
            --head "$branch"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "ptah-v${{ inputs.version }}" \
            --title "Ptah v${{ inputs.version }}" \
            --generate-notes \
            ${{ inputs.prerelease && '--prerelease' || '' }}
